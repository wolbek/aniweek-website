<div class="contact-page">
  <a routerLink="/home">&larr; Back to Home</a>

  <h1>Contact Us</h1>
  <p>Have a question or feedback? Send us a message and we'll get back to you.</p>

  @if (auth.userDataSignal(); as user) {
    <div>
      Sending as <strong>{{ user.displayName }}</strong> ({{ user.email }})
    </div>
  }

  @if (successMessage()) {
    <div>{{ successMessage() }}</div>
  }

  @if (errorMessage()) {
    <div>{{ errorMessage() }}</div>
  }

  <form (ngSubmit)="send()">
    <label for="subject">Subject</label>
    <input
      id="subject"
      type="text"
      [(ngModel)]="subject"
      name="subject"
      placeholder="What is this about?"
      maxlength="200"
      [disabled]="sending()"
    />

    <label for="body">Message</label>
    <textarea
      id="body"
      [(ngModel)]="body"
      name="body"
      placeholder="Write your message here..."
      rows="6"
      maxlength="5000"
      [disabled]="sending()"
    ></textarea>

    <button type="submit" [disabled]="!canSend()">
      @if (sending()) {
        Sending...
      } @else {
        Send Message
      }
    </button>
  </form>
</div>
